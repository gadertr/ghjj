name: Professional Proxy Checker

on:
  workflow_dispatch:
    inputs:
      manual_proxies:
        description: 'Paste proxies here (IP:Port or Protocol://IP:Port)'
        required: false
        type: string
      sub_links:
        description: 'Subscription Links (comma separated)'
        required: false
        type: string
      file_path:
        description: 'File name in repo (if any)'
        required: false
        default: 'proxies.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    
    # اجازه دسترسی برای آپدیت کردن فایل‌ها در ریپازیتوری
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Proxy Test
        run: |
          python proxy_checker.py \
            --manual "${{ github.event.inputs.manual_proxies }}" \
            --links "${{ github.event.inputs.sub_links }}" \
            --file "${{ github.event.inputs.file_path }}"

      - name: Commit and Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add valid_proxies.txt
          # اگر تغییراتی وجود داشت کامیت کن، در غیر این صورت پیام بده
          git commit -m "Update valid proxies list" || echo "No changes to commit"
          git push
